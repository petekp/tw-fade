name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The verify chain launches both Chromium and WebKit.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      # Run unit tests against the committed dist first, so the
      # "dist === fresh compile" freshness gate stays meaningful
      # (a preceding build would mask a stale committed dist).
      - name: Unit tests
        run: npm test

      - name: Browser verify chain
        run: npm run verify
